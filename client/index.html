<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='1em' font-size='90' fill='rgb(168,85,247)'>◈</text></svg>"
    />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />
    <meta name="theme-color" content="#0c0c0f" />
    <meta
      name="description"
      content="Coolify Dashboard - Sunucularınızı yönetin"
    />
    <title>Coolify Dashboard</title>
    <script>
      // Apply theme before first paint to avoid a flash. Defaults to dark.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var dark = stored ? stored === "dark" : true;
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
